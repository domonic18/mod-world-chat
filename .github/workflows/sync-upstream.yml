name: Sync Upstream

on:
  schedule:
    - cron: '0 2 * * 0'  # 每周日 凌晨2点 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream "https://github.com/azerothcore/mod-world-chat.git"

      - name: Fetch upstream
        run: git fetch upstream

      - name: Sync upstream-sync branch
        run: |
          git checkout -B upstream-sync upstream/master 2>/dev/null || git checkout -B upstream-sync upstream/main
          git push origin upstream-sync --force-with-lease
